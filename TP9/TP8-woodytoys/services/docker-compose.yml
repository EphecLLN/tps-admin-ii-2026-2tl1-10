version: "3.9"

services:
  db:
    image: gloutamax/woody_database:latest
    networks:
      - woodynet
    deploy:
      placement:
        constraints:
          - node.hostname == manager1
    cap_add:
      - SYS_NICE
    restart: always
    environment:
      - MYSQL_DATABASE=woody
      - MYSQL_ROOT_PASSWORD=pass

  redis:
    image: redis:alpine
    networks:
      - woodynet
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.hostname == manager1

  api-products:
    image: gloutamax/woody_api:v4
    networks:
      - woodynet
    deploy:
      replicas: 5
      placement:
        constraints:
          - node.hostname == manager1
    depends_on:
      - db
      - redis

  api-users:
    image: gloutamax/woody_api:v4
    networks:
      - woodynet
    deploy:
      replicas: 2
      placement:
        constraints:
          - node.hostname == manager1
    depends_on:
      - db
      - redis

  api-misc:
    image: gloutamax/woody_api:v4
    networks:
      - woodynet
    deploy:
      replicas: 3
      placement:
        constraints:
          - node.hostname == manager1
    depends_on:
      - db
      - redis

  front:
    image: gloutamax/woody_front:v4
    networks:
      - woodynet
    deploy:
      replicas: 2

  reverse:
    image: gloutamax/woody_rp:latest
    networks:
      - woodynet
    volumes:
      - ./reverse-proxy/default.conf:/etc/nginx/conf.d/default.conf
    ports:
      - target: 80
        published: 80
        protocol: tcp
        mode: host
    deploy:
      mode: global
    depends_on:
      - front
      - api-products
      - api-users
      - api-misc

  rabbitmq:
    image: rabbitmq:3-management
    networks:
      - woodynet
    deploy:
      placement:
        constraints:
          - node.hostname == manager1

  worker:
    image: gloutamax/woody_api:v4
    command: python worker.py
    networks:
      - woodynet
    deploy:
      replicas: 2
      placement:
        constraints:
          - node.hostname == manager1
    depends_on:
      - rabbitmq
      - db

networks:
  woodynet:
    driver: overlay

configs:
  nginx_config:
    file: ./reverse-proxy/default.conf
