version: '3.8'

services:
  loadbalancer:
    image: nginx:latest
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web1
      - web2

  web1:
    image: httpd:alpine
    container_name: web1

  web2:
    image: httpd:alpine
    container_name: web2
